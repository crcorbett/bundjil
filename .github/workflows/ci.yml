name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      BUNDJIL_EXECUTOR_MCP_URL: https://executor.sh/mcp/toolkits/bundjil-ci?elicitation_mode=model
      BUNDJIL_EXECUTOR_API_KEY: executor-ci-synthetic-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify
        run: bun run verification
